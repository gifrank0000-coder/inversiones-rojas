<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prueba de Sesión</title>
</head>
<body>
    <h1>Prueba de Sesión</h1>
    <button id="testSession">Probar Sesión</button>
    <button id="testReport">Probar Reporte</button>
    <div id="result"></div>

    <script>
        document.getElementById('testSession').addEventListener('click', async () => {
            try {
                const response = await fetch('/inversiones-rojas/api/test_session_api.php', {
                    credentials: 'same-origin'
                });
                const data = await response.json();
                document.getElementById('result').innerHTML = '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
            } catch (error) {
                document.getElementById('result').innerHTML = 'Error: ' + error.message;
            }
        });

        document.getElementById('testReport').addEventListener('click', async () => {
            try {
                const response = await fetch('/inversiones-rojas/api/generate_report.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    credentials: 'same-origin',
                    body: JSON.stringify({
                        report_type: 'ingresos_diario',
                        module: 'ventas'
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = url;
                a.download = 'test_report.pdf';
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);

                document.getElementById('result').innerHTML = 'Reporte generado exitosamente';
            } catch (error) {
                document.getElementById('result').innerHTML = 'Error: ' + error.message;
            }
        });
    </script>
</body>
</html>
