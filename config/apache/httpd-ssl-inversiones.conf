<IfModule mod_ssl.c>
    <VirtualHost *:443>
        ServerName localhost
        ServerAdmin webmaster@localhost
        DocumentRoot "C:/xampp/htdocs/inversiones-rojas"

        SSLEngine on
        # Rutas a cambiar según donde generes los certificados (mkcert ejemplo)
        SSLCertificateFile "C:/xampp/apache/conf/ssl/inversiones-rojas.crt"
        SSLCertificateKeyFile "C:/xampp/apache/conf/ssl/inversiones-rojas.key"

        <Directory "C:/xampp/htdocs/inversiones-rojas">
            Require all granted
            AllowOverride All
            Options Indexes FollowSymLinks
        </Directory>

        ErrorLog "logs/inversiones-rojas-ssl-error.log"
        CustomLog "logs/inversiones-rojas-ssl-access.log" common
    </VirtualHost>
</IfModule>

# Nota: incluye este archivo desde httpd.conf o httpd-ssl.conf
# Ejemplo (httpd.conf):
# Include "config/apache/httpd-ssl-inversiones.conf"
